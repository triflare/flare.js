name: Continuous deployment

on:
  push:
    tags:
      - 'v*'

# Disable global permissions
permissions: {}

jobs:
  release:
    name: Release extension
    runs-on: ubuntu-latest
    permissions:
      contents: write # Minimum required to create releases
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Verify output
        run: |
          if [ ! -f build/extension.js ]; then
            echo "::error::Build failed: extension.js not found"
            exit 1
          fi
          if [ ! -f build/min.extension.js ]; then
            echo "::error::Build failed: min.extension.js not found"
            exit 1
          fi
          if [ ! -f build/pretty.extension.js ]; then
            echo "::error::Build failed: pretty.extension.js not found"
            exit 1
          fi

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create or update release in an idempotent way
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release exists: updating assets and metadata"
            gh release edit "${{ github.ref_name }}" --title "Release ${{ github.ref_name }}" --draft=false || echo "gh release edit failed (non-critical)."
            gh release upload "${{ github.ref_name }}" ./build/extension.js ./build/min.extension.js ./build/pretty.extension.js --clobber
          else
            echo "Creating new release"
            gh release create "${{ github.ref_name }}" \
              ./build/extension.js \
              ./build/min.extension.js \
              ./build/pretty.extension.js \
              --title "Release ${{ github.ref_name }}" \
              --draft=false \
              --generate-notes
          fi
